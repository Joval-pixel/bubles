<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Teste Robô</title>

<style>
body {
  background:#0b1220;
  color:white;
  font-family:Arial;
  text-align:center;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:10px;
  padding:20px;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>🤖 Teste Funcionando</h1>

<div id="jogos" class="grid"></div>

<script>

function rodar(){

  let div = document.getElementById("jogos");

  div.innerHTML = "";

  for(let i=1;i<=4;i++){

    div.innerHTML += `
      <div class="card">
        <h3>Jogo ${i}</h3>
        <p>Score: ${Math.floor(Math.random()*100)}</p>
      </div>
    `;
  }

}

rodar();

</script>

</body>
</html>
