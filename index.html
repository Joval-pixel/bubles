<script>
async function pegarDados() {
  try {
    const res = await fetch("https://api.allorigins.win/raw?url=https://query1.finance.yahoo.com/v8/finance/chart/^BVSP?interval=1m&range=1d");
    
    const data = await res.json();

    const result = data.chart.result[0];
    const close = result.indicators.quote[0].close;
    const volume = result.indicators.quote[0].volume;

    const preco = close[close.length - 1];

    // VWAP
    let somaPV = 0;
    let somaV = 0;

    for (let i = 0; i < close.length; i++) {
      somaPV += close[i] * (volume[i] || 1);
      somaV += (volume[i] || 1);
    }

    const vwap = somaPV / somaV;

    document.getElementById("preco").innerHTML = `Preço: ${preco.toFixed(0)}`;
    document.getElementById("vwap").innerHTML = `VWAP: ${vwap.toFixed(0)}`;

    let sinal = preco > vwap ? "COMPRA" : "VENDA";
    let cor = preco > vwap ? "green" : "red";

    const sinalEl = document.getElementById("sinal");
    sinalEl.innerHTML = sinal;
    sinalEl.className = "big " + cor;

    // Zonas
    let zonas = [];
    let base = Math.floor(preco / 250) * 250;

    for (let i = -3; i <= 3; i++) {
      zonas.push(base + (i * 250));
    }

    document.getElementById("zonas").innerHTML = zonas.join(" | ");

  } catch (e) {
    console.log("Erro:", e);
  }
}

setInterval(pegarDados, 5000);
pegarDados();
</script>
