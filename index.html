<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Gol365.com.br - Esportes Ao Vivo</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Widgets -->
  <script type="module" crossorigin src="https://widgets.api-sports.io/3.1.0/widgets.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- MENU -->
<nav class="navbar navbar-expand-lg bg-black border-bottom border-secondary sticky-top">
  <div class="container-fluid">

    <!-- LOGO -->
    <a class="navbar-brand fw-bold" href="#">
      <span style="color:#00ff88;">Gol</span><span style="color:white;">365</span><span style="color:#00ff88;">.com.br</span>
    </a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div id="menu" class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link active" data-sport="football" href="#">Futebol</a></li>
        <li class="nav-item"><a class="nav-link" data-sport="basketball" href="#">Basquete</a></li>
        <li class="nav-item"><a class="nav-link" data-sport="baseball" href="#">Baseball</a></li>
        <li class="nav-item"><a class="nav-link" data-sport="hockey" href="#">Hockey</a></li>
        <li class="nav-item"><a class="nav-link" data-sport="volleyball" href="#">Vôlei</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- CONTEÚDO -->
<div class="content p-3">
  <div class="row g-3">

    <!-- LIGAS -->
    <div class="col-lg-3">
      <div id="leagues-box" class="card bg-dark border-secondary">
        <div class="card-header">Ligas</div>
        <div class="card-body p-0">
          <api-sports-widget data-type="leagues"></api-sports-widget>
        </div>
      </div>
    </div>

    <!-- JOGOS -->
    <div class="col-lg-5">
      <div id="games-list" class="card bg-dark border-secondary">
        <div class="card-header">Jogos ao Vivo</div>
        <div class="card-body p-0">
          <api-sports-widget data-type="games"></api-sports-widget>
        </div>
      </div>
    </div>

    <!-- DIREITA -->
    <div class="col-lg-4">

      <div class="card bg-dark border-secondary mb-3">
        <div class="card-body p-0">
          <div id="standings-content"></div>
        </div>
      </div>

      <div class="card bg-dark border-secondary mb-3">
        <div class="card-body p-0">
          <div id="team-content"></div>
        </div>
      </div>

      <div id="game-content" class="card bg-dark border-secondary">
        <div class="card-header">Detalhes do Jogo</div>
        <div class="card-body p-0">
          <api-sports-widget data-type="game"></api-sports-widget>
        </div>
      </div>

    </div>

  </div>
</div>

<!-- CONFIG COM CACHE -->
<api-sports-widget
  data-type="config"
  data-sport="football"

  data-key=""
  data-url-football="https://SEU-CACHE.b-cdn.net/"

  data-lang="pt"
  data-theme="grey"
  data-show-error="true"
  data-show-logos="true"
  data-refresh="20"

  data-favorite="true"
  data-standings="true"
  data-team-statistics="true"
  data-player-statistics="true"

  data-target-player="modal"
  data-target-league="#games-list"
  data-target-team="#team-content"
  data-target-game="#game-content .card-body"
  data-target-standings="#standings-content">
</api-sports-widget>

<!-- SCRIPT TROCAR ESPORTE -->
<script>
document.addEventListener('click', function (event) {

  if (!event.target.matches('.nav-link')) return;

  event.preventDefault();

  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');

  let sport = event.target.getAttribute('data-sport');

  let config = document.querySelector('api-sports-widget[data-type="config"]');
  config.setAttribute('data-sport', sport);

  document.querySelectorAll('api-sports-widget').forEach(widget => {
    if (widget.getAttribute('data-type') !== 'config') {
      widget.innerHTML = '';
      widget.setAttribute('data-sport', sport);
      if (widget.connectedCallback) widget.connectedCallback();
    }
  });

});
</script>

</body>
</html>
