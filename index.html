<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4Selet Termômetro Realtime</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header><h1>4SELET - Termômetro Realtime</h1></header>

<section id="cards">
  <div class="card red"><h2>Dólar DXY</h2><div id="dxy"></div></div>
  <div class="card red"><h2>USD/BRL</h2><div id="usdbrl"></div></div>
  <div class="card green"><h2>WIN Futuro</h2><div id="win"></div></div>
  <div class="card red"><h2>Petróleo WTI</h2><div id="wti"></div></div>
  <div class="card teal"><h2>Telegram</h2><p>Notícias</p></div>
</section>

<!-- TradingView Cards -->
<section id="widgets">
  <div class="tv-box">
    <div class="tradingview-widget-container">
      <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>
      {
        "symbol": "TVC:DXY",
        "width": "100%",
        "height": "160",
        "locale": "br",
        "dateRange": "1D",
        "colorTheme": "dark"
      }
      </script>
    </div>
  </div>

  <div class="tv-box">
    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>
    {
      "symbol": "FX_IDC:USDBRL",
      "width": "100%",
      "height": "160",
      "locale": "br",
      "dateRange": "1D",
      "colorTheme": "dark"
    }
    </script>
  </div>

  <div class="tv-box">
    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>
    {
      "symbol": "BMFBOVESPA:WINQ2024",
      "width": "100%",
      "height": "160",
      "locale": "br",
      "dateRange": "1D",
      "colorTheme": "dark"
    }
    </script>
  </div>

  <div class="tv-box">
    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>
    {
      "symbol": "TVC:USOIL",
      "width": "100%",
      "height": "160",
      "locale": "br",
      "dateRange": "1D",
      "colorTheme": "dark"
    }
    </script>
  </div>
</section>

<hr>

<!-- Ticker Scrolling -->
<section id="ticker">
<script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
{
  "symbols": [
    {"proName":"BINANCE:BTCUSDT","title":"BTC"},
    {"proName":"NASDAQ:TSLA","title":"Tesla"},
    {"proName":"SP:IBOV","title":"Ibovespa"},
    {"proName":"BMFBOVESPA:VALE3","title":"VALE3"},
    {"proName":"BMFBOVESPA:PETR4","title":"PETR4"}
  ],
  "colorTheme": "dark",
  "isTransparent": false,
  "displayMode": "adaptive",
  "locale": "br"
}
</script>
</section>

<hr>

<!-- Tabela B3 -->
<section>
  <h2>Principais Ações B3</h2>
  <table id="b3-table">
    <thead><tr><th>Ativo</th><th>Último</th><th>Var%</th></tr></thead>
    <tbody id="b3body"></tbody>
  </table>
</section>

<footer>
  <p>4Selet Realtime © 2026</p>
</footer>

<script src="script.js"></script>
</body>
</html>
