<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Termômetro do Mercado</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      background: #0b0f1a;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .green { color: #00ff88; }
    .red { color: #ff4d4d; }

    canvas {
      margin-top: 30px;
      background: #111827;
      border-radius: 10px;
      padding: 10px;
    }
  </style>
</head>
<body>

<h1>📊 Termômetro do Mercado</h1>

<div class="grid">
  <div class="card">
    <h2>IBOV</h2>
    <p id="ibov"></p>
  </div>

  <div class="card">
    <h2>Dólar</h2>
    <p id="dolar"></p>
  </div>

  <div class="card">
    <h2>Bitcoin</h2>
    <p id="btc"></p>
  </div>
</div>

<canvas id="grafico"></canvas>

<script>
async function pegarDados() {
  const url = "https://query1.finance.yahoo.com/v8/finance/chart/^BVSP?interval=1m&range=1d";
  const res = await fetch(url);
  const data = await res.json();

  const result = data.chart.result[0];
  const prices = result.indicators.quote[0].close;
  const timestamps = result.timestamp;

  const ultimo = prices[prices.length - 1];
  const primeiro = prices[0];

  const variacao = ((ultimo - primeiro) / primeiro) * 100;

  const ibovEl = document.getElementById("ibov");
  ibovEl.innerHTML = `${ultimo.toFixed(2)} (${variacao.toFixed(2)}%)`;

  ibovEl.className = variacao >= 0 ? "green" : "red";

  atualizarGrafico(prices, timestamps);
}

let chart;

function atualizarGrafico(prices, timestamps) {
  const labels = timestamps.map(t => new Date(t * 1000).toLocaleTimeString());

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("grafico"), {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "IBOV",
        data: prices,
        borderColor: "#00ff88"
      }]
    }
  });
}

setInterval(pegarDados, 5000);
pegarDados();
</script>

</body>
</html>
