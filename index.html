<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Robô Pro - Ao Vivo</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1220;
  color:white;
}

.container {
  max-width:1200px;
  margin:auto;
  padding:20px;
}

h1 {
  text-align:center;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:15px;
  margin-top:20px;
}

.card {
  background:#1e293b;
  border-radius:15px;
  padding:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

.top {
  border:2px solid #22c55e;
}

.jogo {
  font-size:18px;
  font-weight:bold;
}

.info {
  font-size:14px;
  color:#94a3b8;
}

.score {
  font-size:22px;
  margin-top:5px;
}

.barra {
  height:8px;
  background:#0f172a;
  border-radius:10px;
  overflow:hidden;
  margin:8px 0;
}

.barra span {
  display:block;
  height:100%;
  background:#22c55e;
}

.sinal {
  margin-top:10px;
  font-size:18px;
  font-weight:bold;
}

.entrar {
  color:#22c55e;
  animation:piscar 1s infinite;
}

@keyframes piscar {
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}
</style>
</head>

<body>

<div class="container">
<h1>🤖 Robô Pro - Jogos Ao Vivo</h1>
<div id="jogos" class="grid"></div>
</div>

<script>

const API_KEY = "39968ebc05msh2066ef0bf12492dp11b26fjsn664b581399ee";

// 🔥 PROXY AQUI
const BASE_URL = "https://corsproxy.io/?https://api-football-v1.p.rapidapi.com";

async function getJogos() {
  try {
    const res = await fetch(`${BASE_URL}/v3/fixtures?live=all`, {
      headers: {
        "X-RapidAPI-Key": API_KEY,
        "X-RapidAPI-Host": "api-football-v1.p.rapidapi.com"
      }
    });

    const data = await res.json();
    return data.response || [];

  } catch (e) {
    console.log("Erro jogos:", e);
    return [];
  }
}

function num(v){
  if(!v) return 0;
  return parseFloat(v.toString().replace("%","")) || 0;
}

function getStat(stats,name){
  let s = stats.find(x=>x.type===name);
  return s ? num(s.value) : 0;
}

async function getStats(id){

  try {

    const res = await fetch(`${BASE_URL}/v3/fixtures/statistics?fixture=${id}`, {
      headers:{
        "X-RapidAPI-Key": API_KEY,
        "X-RapidAPI-Host": "api-football-v1.p.rapidapi.com"
      }
    });

    const data = await res.json();

    if(!data.response || data.response.length<2) return null;

    let h = data.response[0].statistics;
    let a = data.response[1].statistics;

    return {
      ataques: getStat(h,"Dangerous Attacks")+getStat(a,"Dangerous Attacks"),
      chutes: getStat(h,"Shots on Goal")+getStat(a,"Shots on Goal"),
      escanteios: getStat(h,"Corner Kicks")+getStat(a,"Corner Kicks"),
      posse: (getStat(h,"Ball Possession")+getStat(a,"Ball Possession"))/2
    };

  } catch (e) {
    console.log("Erro stats:", e);
    return null;
  }
}

function score(s,min){
  let sc = s.ataques*0.9 + s.chutes*6 + s.escanteios*2 + s.posse*0.2;
  if(min>15 && min<75) sc+=10;
  return Math.min(100,Math.floor(sc));
}

function sinal(s,sc){
  if(sc>75 && s.chutes>=5 && s.ataques>20)
    return "🔥 ENTRAR";

  if(sc>60)
    return "👀 OBSERVAR";

  return "⏳ AGUARDAR";
}

async function rodar(){

  let jogos = await getJogos();

  let lista = [];

  for(let j of jogos.slice(0,8)){

    let st = await getStats(j.fixture.id);
    if(!st) continue;

    let min = j.fixture.status.elapsed || 0;
    let sc = score(st,min);
    let sn = sinal(st,sc);

    lista.push({
      nome: j.teams.home.name+" x "+j.teams.away.name,
      liga: j.league.name,
      min,
      stats:st,
      score:sc,
      sinal:sn
    });
  }

  lista.sort((a,b)=>b.score-a.score);

  render(lista);
}

function render(lista){

  let div = document.getElementById("jogos");
  div.innerHTML="";

  if(lista.length === 0){
    div.innerHTML = "<h2>⚠️ Nenhum jogo ao vivo ou API limitada</h2>";
    return;
  }

  lista.forEach((j,i)=>{

    div.innerHTML += `
    <div class="card ${i==0?"top":""}">
      <div class="jogo">${j.nome}</div>
      <div class="info">${j.liga} • ${j.min}'</div>

      <div class="score">Score: ${j.score}</div>

      <div class="barra">
        <span style="width:${j.score}%"></span>
      </div>

      <div class="info">
        ⚡ ${j.stats.ataques} | 🎯 ${j.stats.chutes} | 🚩 ${j.stats.escanteios}
      </div>

      <div class="sinal ${j.sinal.includes('ENTRAR')?'entrar':''}">
        ${j.sinal}
      </div>
    </div>
    `;
  });

}

setInterval(rodar,20000);
rodar();

</script>

</body>
</html>
